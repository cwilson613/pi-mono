name: Publish to npm

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+-cwilson613*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (print what would publish, do not actually publish)'
        type: boolean
        default: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publish   # npm trusted publisher requires a named environment
    permissions:
      contents: read
      id-token: write          # required for OIDC token exchange with npm

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          # No NODE_AUTH_TOKEN — OIDC handles authentication

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build --workspaces --if-present

      # Publish in dependency order: agent-core → ai → tui → coding-agent
      - name: Publish @cwilson613/pi-agent-core
        run: |
          npm publish --access public --provenance \
            ${{ inputs.dry_run == 'true' && '--dry-run' || '' }}
        working-directory: packages/agent

      - name: Publish @cwilson613/pi-ai
        run: |
          npm publish --access public --provenance \
            ${{ inputs.dry_run == 'true' && '--dry-run' || '' }}
        working-directory: packages/ai

      - name: Publish @cwilson613/pi-tui
        run: |
          npm publish --access public --provenance \
            ${{ inputs.dry_run == 'true' && '--dry-run' || '' }}
        working-directory: packages/tui

      - name: Publish @cwilson613/pi-coding-agent
        run: |
          npm publish --access public --provenance \
            ${{ inputs.dry_run == 'true' && '--dry-run' || '' }}
        working-directory: packages/coding-agent
